<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1b5ba8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>我的岛屿</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="loading-screen">
        <div class="loading-card">
            <div class="loading-logo"></div>
            <div class="loading-title">我的岛屿</div>
            <div class="loading-sub">正在生成素材包…</div>
            <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
            <div class="loading-status" id="loading-status">正在预热工作台</div>
        </div>
    </div>

    <div id="app" class="hidden">
        <canvas id="game-canvas"></canvas>

        <header id="title-card">
            <div class="title-logo"></div>
            <div class="title-text">
                <h1>我的岛屿</h1>
                <p>搭建漂亮的地中海体素世界</p>
            </div>
        </header>

        <aside id="toolbar"></aside>

        <section id="palette">
            <nav id="palette-tabs"></nav>
            <div id="palette-grid"></div>
        </section>

        <section id="hud">
            <div class="hud-row">
                <div class="hud-clock">
                    <span class="sun-icon"></span>
                    <span id="hud-time">10:42</span>
                </div>
            </div>
            <div class="hud-toggles">
                <label class="toggle"><span>阴影</span><input type="checkbox" id="toggle-ao" checked /><span class="switch"></span></label>
                <label class="toggle"><span>网格</span><input type="checkbox" id="toggle-grid" /><span class="switch"></span></label>
                <label class="toggle"><span>边框</span><input type="checkbox" id="toggle-borders" checked /><span class="switch"></span></label>
            </div>
            <div class="hud-layers">图层</div>
        </section>

        <details id="instructions" aria-label="操作帮助">
            <summary class="ins-summary">
                <span class="ins-badge" aria-hidden="true">?</span>
                <span class="ins-summary-label">操作说明</span>
                <span class="ins-summary-hint" aria-hidden="true">点击展开</span>
            </summary>
            <div class="ins-grid ins-grid--mouse">
                <span class="key">单击</span><span>放置选中的素材</span>
                <span class="key">拖动</span><span>连续放置多个格子</span>
                <span class="key">右键</span><span>擦除</span>
                <span class="key">右键拖动</span><span>连续擦除</span>
                <span class="key">Shift 拖动</span><span>平移视角</span>
                <span class="key">滚轮</span><span>缩放</span>
                <span class="key">H / V</span><span>翻转预览</span>
                <span class="key">E</span><span>切换擦除模式</span>
                <span class="key">G</span><span>显示/隐藏网格</span>
                <span class="key">1-5</span><span>切换素材分类</span>
                <span class="key">S / R</span><span>保存 / 重置</span>
            </div>
            <div class="ins-grid ins-grid--touch">
                <span class="key">轻点</span><span>放置选中的素材</span>
                <span class="key">拖动</span><span>连续放置多个格子</span>
                <span class="key">长按</span><span>擦除手指下的格子</span>
                <span class="key">双指捏合</span><span>放大 / 缩小</span>
                <span class="key">双指拖动</span><span>平移视角</span>
                <span class="key">分类栏</span><span>切换素材分类</span>
            </div>
        </details>

        <div id="toast"></div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
